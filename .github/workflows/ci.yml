name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-renderer:
    name: Build Renderer (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - run: npm run build:renderer
      - run: npm run lint
      - run: npm run typecheck

  test-python:
    name: Test Python Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install Maturin
        run: pip install maturin
      - name: Install core dependencies
        run: |
          cd core
          python -m pip install --upgrade pip setuptools wheel
          pip install ".[dev]"
      - name: Build and install Rust core
        run: pip install ./core/rust_core
      - name: Lint with Ruff
        run: cd core && python -m ruff check .
      - name: Run tests
        run: cd core && PYTHONPATH=. python -m pytest tests/ -v --tb=short

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --legacy-peer-deps
      - name: npm audit
        run: npm audit --audit-level=high
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: pip-audit
        run: |
          pip install pip-audit
          # Ignoring CVE-2026-4539 in pygments as 2.19.2 is the latest and unpatched upstream.
          cd core && pip-audit . --local --ignore-vuln GHSA-v7gc-8p33-6p5q --ignore-vuln CVE-2026-4539
