name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-renderer:
    name: Build Renderer (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:renderer
      - run: npm run lint
      - run: npm run typecheck

  test-python:
    name: Test Python Core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install core dependencies
        run: |
          cd core
          pip install -e ".[dev]"
      - name: Lint with Ruff
        run: cd core && ruff check .
      - name: Run tests
        run: cd core && python -m pytest tests/ -v --tb=short

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: pip-audit
        run: |
          pip install pip-audit
          cd core && pip-audit -r <(pip install -e . --dry-run 2>&1 | grep "^Requirement" | sed 's/Requirement already satisfied: //;s/ .*//') || true
